# 激活开发环境配置（使用H2内存数据库+内存缓存，无需Redis）
spring.profiles.active=dev

# 服务端口
server.port=8080

# ===== MySQL 数据库 =====
spring.datasource.url=jdbc:mysql://?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=
spring.datasource.password=

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# ===== JSON =====
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# ===== Redis =====
spring.redis.host=
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=3000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# ===== 缓存 =====
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ===== 日志 =====
logging.level.com.xuegong=DEBUG

# ===== AI Provider Selection =====
ai.provider=zhipu

# ===== 智谱 AI =====
zhipu.api-key=
zhipu.api-url=https://open.bigmodel.cn/api/paas/v4/chat/completions
zhipu.model=glm-4.5-flash

# ===== OpenAI =====
openai.api-key=
openai.api-url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4

# ===== LangChain4j =====
langchain4j.open-ai.chat-model.api-key=${openai.api-key}
langchain4j.open-ai.chat-model.model-name=${openai.model}
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.max-tokens=1024
langchain4j.open-ai.chat-model.timeout=PT60S

# ===== Chat Memory =====
ai.chat-memory.max-messages=20

# ===== ChromaDB =====
langchain4j.chroma.url=http://localhost:8000
langchain4j.chroma.collection-name=xuegong-knowledge

# ===== Embedding Model =====
langchain4j.open-ai.embedding-model.api-key=${openai.api-key}
langchain4j.open-ai.embedding-model.model-name=text-embedding-ada-002

# ===== RAG =====
ai.rag.enabled=false
ai.rag.max-results=3
ai.rag.min-score=0.7
